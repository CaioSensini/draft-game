<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile viewport: landscape-locked, no user zoom -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Prefer landscape orientation where supported. The JS-side
         screen.orientation.lock('landscape') in main.ts enforces this on
         Android and PWAs; iOS Safari ignores these hints but still respects
         landscape through the visual layout. -->
    <meta name="screen-orientation" content="landscape" />
    <meta name="x5-orientation" content="landscape" />

    <!-- iOS PWA status bar + theme color -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f1117" />

    <!--
      Design System — Phase 1 fonts
      Cinzel (display), Cormorant Garamond (serif/card names), Manrope (body UI),
      JetBrains Mono (stats). BootScene blocks scene transitions on
      document.fonts.ready to avoid flash-of-fallback on first render.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />

    <title>Draft Game</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0f1117;
        overflow: hidden;
        height: 100%;
        /* Safe-area insets for iOS notch + Android gesture bar.
           Phaser's FIT scale mode centers the canvas inside the padded area. */
        padding-top:    env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left:   env(safe-area-inset-left);
        padding-right:  env(safe-area-inset-right);
        box-sizing: border-box;
        /* Disable iOS text selection bounce and pull-to-refresh */
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
        overscroll-behavior: none;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      /*
       * Canvas image-rendering hints — Phaser's 1280×720 canvas is upscaled
       * by the browser on most monitors (1920×1080 desktop = 1.5× scale).
       * Default bilinear filtering produces visible "ringing" halos around
       * high-contrast Cinzel display text on the navy top bar — which
       * reads as decorative angled stripes flanking short titles.
       *
       * Hint the browser to prefer crisp upscaling; the game is largely
       * pixel art so pixelated is appropriate, with -webkit-optimize-
       * contrast as the legacy fallback for browsers that ignore the
       * modern keyword.
       */
      #game canvas {
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }

      /* Hide scrollbars defensively if the canvas ever overflows */
      ::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
